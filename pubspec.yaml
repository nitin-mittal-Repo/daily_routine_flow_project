name: daily_routine_flow
description: "Daily Routine Flow — Todos, Water Tracker, Task Calendar & Notepad."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  uuid: ^4.5.0
  sqflite: ^2.3.3+1
  timezone: ^0.9.2  # Add this dependency
  change_app_package_name: ^1.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.2
  go_router_builder: ^2.7.0

  # ── Code Generation (Drift) ───────────────────
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/